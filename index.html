<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM BYPASS v3.0 - RED MAGIC</title>
    <style>
        :root {
            --red-magic: #ff003c;
            --dark-core: #050505;
            --panel: #111111;
            --text-glow: 0 0 10px rgba(255, 0, 60, 0.7);
        }

        * { box-sizing: border-box; outline: none; }

        body {
            background: var(--dark-core);
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif, 'Segoe UI';
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 60, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 60, 0.05) 0%, transparent 50%);
        }

        .container {
            background: var(--panel);
            width: 90%;
            max-width: 450px;
            padding: 30px;
            border-top: 3px solid var(--red-magic);
            border-bottom: 3px solid var(--red-magic);
            position: relative;
            clip-path: polygon(0 5%, 5% 0, 100% 0, 100% 95%, 95% 100%, 0 100%);
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }

        .container::before {
            content: "SYSTEM ONLINE";
            position: absolute;
            top: 5px;
            right: 15px;
            font-size: 8px;
            color: var(--red-magic);
            letter-spacing: 1px;
        }

        h2 {
            text-align: left;
            margin: 0 0 20px 0;
            color: #fff;
            text-transform: uppercase;
            font-style: italic;
            border-left: 4px solid var(--red-magic);
            padding-left: 10px;
            text-shadow: var(--text-glow);
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #222;
            color: #fff;
            font-family: monospace;
            border-radius: 2px;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--red-magic);
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--red-magic);
            border: none;
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 2px;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
            transition: 0.2s;
        }

        button:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        #resultArea {
            margin-top: 25px;
            background: #000;
            padding: 15px;
            border-left: 2px solid var(--red-magic);
            display: none;
            animation: slideIn 0.4s ease-out;
        }

        #statusLabel {
            font-size: 10px;
            color: var(--red-magic);
            margin-bottom: 5px;
            display: block;
        }

        #destLink {
            color: #00ffcc;
            text-decoration: none;
            word-break: break-all;
            font-family: monospace;
            font-size: 14px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-tag {
            text-align: center;
            margin-top: 15px;
            font-size: 10px;
            color: #444;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Phantom Bypass <span style="font-size: 10px; color: var(--red-magic);">[ULTRA]</span></h2>
        
        <div class="input-group">
            <input type="text" id="adLink" placeholder="ENTER TARGET URL...">
        </div>

        <button onclick="bypassNow()">Execute Bypass</button>

        <div id="resultArea">
            <span id="statusLabel">SCANNING PROTOCOLS...</span>
            <a id="destLink" href="#" target="_blank">LINK_NOT_FOUND</a>
        </div>

        <div class="footer-tag">DIZZ X PHANTOM CODES</div>
    </div>

    <script>
        async function bypassNow() {
            const input = document.getElementById("adLink").value.trim();
            const resultArea = document.getElementById("resultArea");
            const destLink = document.getElementById("destLink");
            const statusLabel = document.getElementById("statusLabel");

            if (!input) {
                alert("CRITICAL ERROR: No Link Detected.");
                return;
            }

            // UI Reset
            resultArea.style.display = "block";
            statusLabel.innerText = "INITIALIZING PHANTOM CORE...";
            destLink.innerText = "Bypassing Encrypted Layers...";
            destLink.style.color = "#ffea00";

            try {
                let finalUrl = "";

                // STEP 1: Deep URL Analysis
                const url = new URL(input);
                const params = new URLSearchParams(url.search);
                
                // Kunin lahat ng posibleng redirects
                let rawMatch = params.get('url') || params.get('link') || params.get('dest') || params.get('target') || params.get('u');

                // STEP 2: Multi-Layer Base64 Decoding
                if (rawMatch) {
                    try {
                        let decoded = atob(rawMatch);
                        // Check if it's nested (double encoded)
                        if (decoded.includes("http")) finalUrl = decoded;
                        else finalUrl = rawMatch;
                    } catch(e) {
                        finalUrl = rawMatch;
                    }
                }

                // STEP 3: GOD TIER API OVERRIDE (For Hard Links)
                if (!finalUrl || !finalUrl.startsWith('http')) {
                    statusLabel.innerText = "OVERRIDING SERVER SECURITY...";
                    
                    // Gagamit ng pinagsamang Bypass APIs
                    const endpoints = [
                        `https://api.bypass.vip/bypass?url=${encodeURIComponent(input)}`,
                        `https://bypass.bot.nu/bypass2?url=${encodeURIComponent(input)}`
                    ];

                    const response = await fetch(endpoints[0]);
                    const data = await response.json();

                    if (data.status === "success" || data.success) {
                        finalUrl = data.destination || data.result;
                    } else {
                        throw new Error("GATEWAY_TIMEOUT: Manual Bypass Required");
                    }
                }

                // Final Polish
                statusLabel.innerText = "BYPASS SUCCESSFUL - READY TO LAUNCH";
                destLink.href = finalUrl;
                destLink.innerText = finalUrl;
                destLink.style.color = "#00ffcc";

            } catch (err) {
                statusLabel.innerText = "DECRYPTION FAILED";
                destLink.innerText = "SYSTEM ERROR: " + err.message;
                destLink.style.color = "#ff003c";
            }
        }
    </script>
</body>
</html>
